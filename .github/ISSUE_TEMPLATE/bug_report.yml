name: Bug report
description: Report a bug
title: "[Bug]: "
labels: ["bug"]

body:
  - type: textarea
    id: bug
    attributes:
      label: Bug description
      description: Describe the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
