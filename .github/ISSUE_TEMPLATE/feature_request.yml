name: Feature request
description: Suggest a new feature
title: "[Feature]: "
labels: ["feature"]

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you want.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Any alternative solutions?

  - type: textarea
    id: context
    attributes:
      label: Additional context
